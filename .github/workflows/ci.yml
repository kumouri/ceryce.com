name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Typecheck (astro check)
        run: npm run check
      - name: Build
        run: npm run build

  deploy:
    name: Deploy to Cloudflare
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check for Cloudflare credentials
        id: cf
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CLOUDFLARE_API_TOKEN is not set — skipping deploy. Add the repo secret to enable deploys."
          fi
      - name: Set up Node.js
        if: steps.cf.outputs.ready == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install
        if: steps.cf.outputs.ready == 'true'
        run: npm ci
      - name: Build
        if: steps.cf.outputs.ready == 'true'
        run: npm run build
      - name: Deploy
        if: steps.cf.outputs.ready == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Hybrid SSR: deploy the adapter-resolved config (Worker entry + dist/client assets),
          # not the root user config. Generated by `astro build` (the previous step).
          command: deploy --config dist/server/wrangler.json
